services:
  postgres:
    image: postgres:16-alpine
    container_name: granafacil-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: granafacil
      POSTGRES_PASSWORD: granafacil_dev
      POSTGRES_DB: granafacil_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U granafacil -d granafacil_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
