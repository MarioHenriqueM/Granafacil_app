name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://granafacil:granafacil_dev@localhost:5432/granafacil_test?schema=public
      TEST_DATABASE_URL: postgresql://granafacil:granafacil_dev@localhost:5432/granafacil_test?schema=public
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: granafacil
          POSTGRES_PASSWORD: granafacil_dev
          POSTGRES_DB: granafacil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U granafacil -d granafacil_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build UI
        run: npm run build:ui
